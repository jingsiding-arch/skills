interface:
  display_name: "B端优化方案+测试文档"
  short_description: "把原始优化记录和设计思路打磨成优化需求方案，并在同一份飞书文档底部追加测试用例"
  default_prompt: "使用 $bdoc-optimization-testcase-writer，基于我给出的原始需求记录和设计思路，先做多轮审慎挑战与补全，再生成一份包含优化需求方案与底部测试用例的飞书文档；所有回答都按“直接执行 / 深度交互”两部分输出。生成飞书文档时，避免使用飞书不稳定的 Markdown 组合写法（如 blockquote+list、嵌套 callout）。仅当需求确实涉及跨页面、跨角色、跨状态、审批链路、批量处理、异常分支或回退路径时才展开“操作流程”，并优先落成飞书白板流程图；无法落图时说明降级原因，不要声称已插入白板。凡涉及字段填写的设计，默认补齐“是否必填、默认值”；审核类功能标题默认标记 PC / 移动端；重点内容允许用加粗及少量蓝色、紫色强化。"
